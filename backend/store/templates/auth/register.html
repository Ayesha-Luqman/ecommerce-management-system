{% extends 'base.html' %}

{% block content %}

<div class="container mt-5">

    <div class="col-md-6 offset-md-3">

        <h2 class="mb-4">Register</h2>

        <form method="POST">
            {% csrf_token %}

            <input type="text" name="username" placeholder="Username" class="form-control mb-3">

            <input type="email" name="email" placeholder="Email" class="form-control mb-3">

            <input type="password" name="password" placeholder="Password" class="form-control mb-3">

            <input type="text" name="phone" placeholder="Phone Number" class="form-control mb-3">

            <textarea name="address" placeholder="Address" class="form-control mb-3" rows="3"></textarea>

            <button type="submit" class="btn btn-dark w-100">
                Register
            </button>

        </form>

        {% if error %}
            <p class="text-danger mt-2">{{ error }}</p>
        {% endif %}

    </div>

</div>

{% endblock %}
