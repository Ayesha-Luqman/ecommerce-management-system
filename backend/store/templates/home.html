{% extends 'base.html' %}

{% block content %}

<h2 class="mb-4">Latest Products</h2>

<div class="row">

{% for product in products %}
    <div class="col-md-4">
        <div class="card mb-4">
            <img src="{{ product.image.url }}" class="card-img-top" height="200">

            <div class="card-body">
                <h5 class="card-title">
                    <a href="{% url 'product_detail' product.id %}">{{ product.name }}</a>
                </h5>
                <p class="card-text">{{ product.description }}</p>
                <p><b>Price:</b> {{ product.price }}</p>
            </div>
        </div>
    </div>
{% endfor %}

</div>

{% endblock %}
