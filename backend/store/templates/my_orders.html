{% extends 'base.html' %}

{% block content %}

<h2 class="mb-4">My Orders</h2>

{% for order in orders %}

    <div class="card mb-3 p-3">

        <h5>Order ID: {{ order.id }}</h5>

        <p><b>Status:</b> {{ order.status }}</p>

        <p><b>Date:</b> {{ order.order_date }}</p>

    </div>

{% empty %}

    <p>You have no orders yet.</p>

{% endfor %}

{% endblock %}
